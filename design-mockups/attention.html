<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Direction A — Attention</title>
<style>
  :root { --accent: #6c8aff; --accent2: #38e8d0; }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #07070a; color: #f0f0f2;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; overflow: hidden; }
  canvas { display: block; }
  .hud { position: fixed; top: 26px; left: 28px; font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: .04em; color: #6a6a76; line-height: 1.9; pointer-events: none; }
  .hud b { color: var(--accent2); font-weight: 500; }
  .title { position: fixed; bottom: 40px; left: 28px; max-width: 460px; pointer-events: none; }
  .title .kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .title h1 { font-size: clamp(28px, 4vw, 46px); font-weight: 600; letter-spacing: -.02em; line-height: 1.05; }
  .title p { margin-top: 12px; color: #8a8a94; font-size: 14px; line-height: 1.6; max-width: 380px; }
  .hint { position: fixed; bottom: 40px; right: 28px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #4a4a54; letter-spacing: .05em; }
  a.back { position: fixed; top: 24px; right: 28px; color: #6a6a76; text-decoration: none;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .05em; }
  a.back:hover { color: var(--accent); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  layer <b id="layer">04</b> / 12 &nbsp; head <b id="head">07</b><br />
  softmax Σ = <b>1.000</b><br />
  tokens <b id="ntok">10</b> &nbsp; mode <b id="mode">auto</b>
</div>
<div class="title">
  <div class="kicker">Direction A · Attention</div>
  <h1>Self-attention, made visible.</h1>
  <p>Query tokens on the left attend to key tokens on the right. Line weight = attention. Hover a token to isolate its distribution.</p>
</div>
<div class="hint">hover a left-column token →</div>
<a class="back" href="./index.html">← all directions</a>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, DPR;
function resize(){ DPR = Math.min(devicePixelRatio||1, 2); W = innerWidth; H = innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize', resize); resize();

const tokens = ["Attention","is","all","you","need","—","transformers","learn","to","attend"];
const N = tokens.length;
document.getElementById('ntok').textContent = N;

// evolving score matrix -> softmax rows
let scores = Array.from({length:N}, () => Array.from({length:N}, () => Math.random()));
let phase = Array.from({length:N}, () => Array.from({length:N}, () => Math.random()*Math.PI*2));
function softmax(row){ const m=Math.max(...row); const e=row.map(v=>Math.exp((v-m)*3)); const s=e.reduce((a,b)=>a+b,0); return e.map(v=>v/s); }

let mouse = {x:-1,y:-1}, hover = -1;
cv.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
cv.addEventListener('mouseleave', () => { mouse.x=-1; mouse.y=-1; });

function layout(){
  const topPad = H*0.16, botPad = H*0.16, span = H - topPad - botPad;
  const lx = W*0.34, rx = W*0.66;
  const pts = [];
  for(let i=0;i<N;i++){ const y = topPad + span*(i/(N-1)); pts.push({y, lx, rx}); }
  return {pts, lx, rx};
}

let t = 0;
function frame(){
  t += 0.006;
  ctx.clearRect(0,0,W,H);
  // subtle vignette bg dots
  const {pts, lx, rx} = layout();

  // find hover (left column)
  hover = -1;
  for(let i=0;i<N;i++){ const dx=mouse.x-lx, dy=mouse.y-pts[i].y; if(mouse.x>0 && Math.hypot(dx,dy)<80 && mouse.x<W*0.5){ hover=i; } }
  document.getElementById('mode').textContent = hover>=0 ? 'focus' : 'auto';

  // draw edges
  for(let i=0;i<N;i++){
    const w = softmax(scores[i].map((s,j)=> s + 0.6*Math.sin(t*1.3 + phase[i][j])));
    const focused = hover===i, dim = hover>=0 && !focused;
    for(let j=0;j<N;j++){
      let a = w[j];
      if(a < 0.04) continue;
      let alpha = a * (focused ? 1 : dim ? 0.05 : 0.5);
      const x1=lx, y1=pts[i].y, x2=rx, y2=pts[j].y;
      const cx = (x1+x2)/2;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.bezierCurveTo(cx,y1, cx,y2, x2,y2);
      const g = ctx.createLinearGradient(x1,y1,x2,y2);
      g.addColorStop(0, `rgba(108,138,255,${alpha})`);
      g.addColorStop(1, `rgba(56,232,208,${alpha})`);
      ctx.strokeStyle = g;
      ctx.lineWidth = 0.6 + a*(focused?5:3.2);
      ctx.stroke();
    }
  }

  // draw tokens
  ctx.font = "500 14px 'JetBrains Mono', monospace";
  for(let i=0;i<N;i++){
    drawToken(lx, pts[i].y, tokens[i], 'left', hover===i, hover>=0 && hover!==i);
    drawToken(rx, pts[i].y, tokens[i], 'right', false, false);
  }

  // HUD flicker
  if(Math.random()<0.02){ document.getElementById('layer').textContent = String(1+Math.floor(Math.random()*12)).padStart(2,'0'); }
  if(Math.random()<0.02){ document.getElementById('head').textContent = String(1+Math.floor(Math.random()*8)).padStart(2,'0'); }

  requestAnimationFrame(frame);
}

function drawToken(x, y, text, side, active, dim){
  ctx.save();
  const w = ctx.measureText(text).width + 22, h = 26;
  const bx = side==='left' ? x - w + 14 : x - 14;
  ctx.globalAlpha = dim ? 0.3 : 1;
  ctx.beginPath();
  roundRect(bx, y-h/2, w, h, 6);
  ctx.fillStyle = active ? 'rgba(56,232,208,0.14)' : 'rgba(255,255,255,0.03)';
  ctx.fill();
  ctx.lineWidth = 1;
  ctx.strokeStyle = active ? 'rgba(56,232,208,0.6)' : 'rgba(255,255,255,0.08)';
  ctx.stroke();
  ctx.fillStyle = active ? '#d7fff8' : '#c8c8d0';
  ctx.textBaseline = 'middle';
  ctx.textAlign = side==='left' ? 'right' : 'left';
  ctx.fillText(text, side==='left' ? x : x, y);
  // connection dot
  ctx.beginPath();
  ctx.arc(x, y, active?4:2.5, 0, Math.PI*2);
  ctx.fillStyle = active ? '#38e8d0' : '#6c8aff';
  ctx.fill();
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); }
frame();
</script>
</body>
</html>
